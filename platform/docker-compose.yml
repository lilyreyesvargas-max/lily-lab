##
## Docker Compose - Plataforma multi-tenant
##
## Uso:
##   Solo infra:       docker compose up -d postgres
##   Infra + Keycloak: docker compose up -d postgres keycloak
##   Todo (con app):   docker compose --profile app up -d
##   Parar:            docker compose down
##   Parar + borrar:   docker compose down -v
##

services:

  # ── PostgreSQL 16 ──
  postgres:
    image: postgres:16-alpine
    container_name: platform-postgres
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - platform-net

  # ── Keycloak 23 (OIDC provider) ──
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: platform-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./docker/keycloak/platform-realm.json:/opt/keycloak/data/import/platform-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\n\\r\\n' >&3; timeout 1 cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10
    networks:
      - platform-net

  # ── MinIO (almacenamiento S3-compatible) ──
  minio:
    image: minio/minio:latest
    container_name: platform-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  # ── Platform App (perfil 'app') ──
  platform-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platform-app
    profiles:
      - app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: platform
      DB_USER: platform
      DB_PASSWORD: platform
      # Descomentar para OIDC con Keycloak:
      # SPRING_PROFILES_ACTIVE: prod
      # OIDC_ISSUER_URI: http://keycloak:8080/realms/platform
      # OIDC_JWK_SET_URI: http://keycloak:8080/realms/platform/protocol/openid-connect/certs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 5
    networks:
      - platform-net

volumes:
  pgdata:
  miniodata:

networks:
  platform-net:
    driver: bridge
