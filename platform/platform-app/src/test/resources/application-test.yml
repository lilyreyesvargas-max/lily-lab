##
## Perfil TEST: H2 en memoria, sin Docker, sin multi-tenancy complejo
##
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS PLATFORM
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false  # Flyway es manejado por TenantBootstrapRunner programáticamente

flowable:
  database-schema-update: true
  async-executor-activate: false

app:
  security:
    mode: jwt-local
    jwt-secret: test-secret-key-minimum-256-bits-long-for-hs256-signing
  tenants:
    - TEST

logging:
  level:
    com.lreyes.platform: WARN
    org.flywaydb: WARN
