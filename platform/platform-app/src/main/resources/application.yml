##
## Configuración base de la plataforma
## Perfiles: dev | local | prod
##
spring:
  application:
    name: platform

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
    session:
      timeout: 30m

## ZK UI
zk:
  homepage: zul/login
  springboot-packaging: jar

## ── OpenAPI / Swagger ──
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  show-actuator: false
  default-produces-media-type: application/json

## ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    info:
      enabled: true
    loggers:
      enabled: true
  info:
    env:
      enabled: true
    build:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

## ── Info endpoint ──
info:
  app:
    name: ${spring.application.name}
    version: 0.1.0-SNAPSHOT
    description: Plataforma multi-tenant con Spring Boot, ZK, Flowable
  modules:
    - customers
    - employees
    - sales
    - documents
    - workflow

## ── Logging con requestId ──
logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] [%X{requestId:-}] %-5level %logger{36} - %msg%n"
