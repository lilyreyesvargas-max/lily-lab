[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo_pwd_strong
admin_passwd = admin_local_strong
list_db = False
log_level = warn
log_handler = :WARNING
logfile = False
proxy_mode = True

; ─── Performance (PRODUCTION) ─────────────────────────────────────────────────
; workers = 2 × CPU cores (minimum 4 for clinic workload)
workers = 4
max_cron_threads = 2

; ─── Memory & Request Limits ──────────────────────────────────────────────────
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 300
limit_time_real = 600

; ─── Longpolling ──────────────────────────────────────────────────────────────
longpolling_port = 8072
